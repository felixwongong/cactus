name: PR Verification

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "approved=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.review.state }}" = "approved" ]; then
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

  verify:
    needs: gate
    if: needs.gate.outputs.approved == 'true'
    runs-on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Check for Python changes
        id: check_python
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "python_changed=false" >> $GITHUB_OUTPUT
          else
            CHANGED=$(gh pr diff ${{ github.event.pull_request.number }} --name-only | grep -cE '^python/(src/|requirements\.txt)' || true)
            echo "python_changed=$([[ $CHANGED -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Ensure venv exists
        run: |
          if [ ! -f venv/bin/activate ]; then
            echo "No venv found, running setup..."
            source ./setup
          fi

      - name: Rebuild venv if Python sources changed
        if: steps.check_python.outputs.python_changed == 'true'
        run: |
          deactivate || true
          rm -rf venv
          source ./setup

      - name: Purge cached weights if converters changed
        if: steps.check_python.outputs.python_changed == 'true'
        run: rm -rf weights/

      - name: Convert models if weights missing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          source venv/bin/activate
          convert_if_missing() {
            local model_id=$1 output_dir=$2 precision=$3
            if [ ! -f "weights/$output_dir/config.txt" ]; then
              echo "Converting $model_id -> weights/$output_dir"
              python3 -m src.cli convert "$model_id" "weights/$output_dir" --precision "$precision" ${HF_TOKEN:+--token "$HF_TOKEN"} || true
              local default_dir="weights/$(echo "$model_id" | sed 's|.*/||' | tr '[:upper:]' '[:lower:]')"
              if [ ! -f "weights/$output_dir/config.txt" ] && [ -f "$default_dir/config.txt" ]; then
                mv "$default_dir" "weights/$output_dir"
              fi
            fi
          }
          convert_if_missing "Qwen/Qwen3-0.6B" "qwen3-0.6b" "INT8"
          convert_if_missing "nomic-ai/nomic-embed-text-v2-moe" "nomic-embed-text-v2-moe" "INT8"
          convert_if_missing "LiquidAI/LFM2-350M" "lfm2-350m" "INT8"
          convert_if_missing "LiquidAI/LFM2-8B-A1B" "lfm2-8b-a1b" "INT8"
          convert_if_missing "google/gemma-3-270m-it" "gemma-3-270m-it" "INT8"
          convert_if_missing "openai/whisper-small" "whisper-small" "INT8"
          convert_if_missing "UsefulSensors/moonshine-base" "moonshine-base" "INT8"
          convert_if_missing "LiquidAI/LFM2-VL-450M" "lfm2-vl-450m-int8" "INT8"

      - name: Build library
        run: bash cactus/build.sh

      - name: Build tests
        run: |
          cd tests
          rm -rf build && mkdir -p build && cd build
          cmake .. -DCMAKE_RULE_MESSAGES=OFF -DCMAKE_VERBOSE_MAKEFILE=OFF
          make -j$(nproc)

      - name: Run unit tests
        env:
          CACTUS_INDEX_PATH: ${{ runner.temp }}/cactus_index
        run: |
          mkdir -p "$CACTUS_INDEX_PATH"
          FAILED=0
          for test in test_graph test_kernel test_kv_cache test_index; do
            echo "=== Running $test ==="
            if ! ./tests/build/$test; then
              FAILED=$((FAILED + 1))
            fi
          done
          if [ $FAILED -gt 0 ]; then exit 1; fi

      - name: Run model loading tests
        run: ./tests/build/test_model_loading

      - name: Run ground truth tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          FAILED=0
          run_model_test() {
            local family=$1 model_dir=$2 env_var=$3 precision=$4
            echo "=== Testing $family ($precision) ==="
            export ${env_var}="${{ github.workspace }}/weights/$model_dir"
            export CACTUS_TEST_ASSETS="${{ github.workspace }}/tests/assets"
            export CACTUS_TEST_GOLDEN_DIR="${{ github.workspace }}/tests/golden"
            export CACTUS_TEST_GOLDEN_FAMILY="$family"
            export CACTUS_TEST_GOLDEN_PRECISION="$precision"
            if [ "$family" = "whisper" ] || [ "$family" = "moonshine" ]; then
              export CACTUS_TEST_VAD_MODEL="${{ github.workspace }}/weights/silero-vad"
            fi
            if ! ./tests/build/test_groundtruth; then
              FAILED=$((FAILED + 1))
            fi
          }
          run_model_test qwen qwen3-0.6b CACTUS_TEST_MODEL INT8
          run_model_test nomic nomic-embed-text-v2-moe CACTUS_TEST_MODEL INT8
          run_model_test lfm2 lfm2-350m CACTUS_TEST_MODEL INT8
          run_model_test lfm2moe lfm2-8b-a1b CACTUS_TEST_MODEL INT8
          run_model_test gemma gemma-3-270m-it CACTUS_TEST_MODEL INT8
          run_model_test whisper whisper-small CACTUS_TEST_TRANSCRIBE_MODEL INT8
          run_model_test moonshine moonshine-base CACTUS_TEST_TRANSCRIBE_MODEL INT8
          run_model_test lfm2vl lfm2-vl-450m-int8 CACTUS_TEST_MODEL INT8
          if [ $FAILED -gt 0 ]; then
            echo "$FAILED model test(s) failed"
            exit 1
          fi
